<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios REEV</title>
<!-- ✅ CSS externo (más pro) -->
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<!-- HEADER -->
<div class="header">
  <h2>USUARIOS</h2>
</div>


<!-- GERENCIAS VISUAL -->
<div class="gerencias">
  <button onclick="selectGerencia('PUEBLA')">🏪 PUEBLA</button>
  <button onclick="selectGerencia('MORELIA')">📍 MORELIA</button>
  <button onclick="selectGerencia('SURESTE')">🌴 SURESTE</button>
  <button onclick="selectGerencia('PENINSULA')">🌊 PENÍNSULA</button>
</div>

<!-- BUSCADOR -->
<div class="search-box">
  <input type="text" id="search" placeholder="Buscar tienda o código...">
</div>

<!-- BOTON REGRESAR -->
<button onclick="resetGerencia()">🔙 Cambiar gerencia</button>

<script>
let data = [];
let timeout;
let currentGerencia = "";

// ✅ CARGAR JSON
fetch('data.json')
  .then(res => res.json())
  .then(json => {
    data = json;
    document.getElementById("loading").style.display = "none";
    render();
  });

// ✅ SELECCIONAR GERENCIA
function selectGerencia(g) {
  currentGerencia = g;
  document.querySelector(".gerencias").style.display = "none";
  render();
}

// ✅ RESET GERENCIA
function resetGerencia() {
  currentGerencia = "";
  document.querySelector(".gerencias").style.display = "grid";
  render();
}

// ✅ RENDER
const list = document.getElementById("list");

function render(filter = "") {

  list.innerHTML = "";

  data
    .filter(d => {

      const gerenciaLimpia = d.gerencia
        .toUpperCase()
        .replace("GERENCIA ", "");

      return (
        (currentGerencia === "" || gerenciaLimpia === currentGerencia) &&
        (
          d.tienda.toLowerCase().includes(filter.toLowerCase()) ||
          d.code.toLowerCase().includes(filter.toLowerCase())
        )
      );
    })
    .slice(0, 80)
    .forEach(d => {

      list.innerHTML += `
        <div class="item" onclick="openModal('${d.tienda}','${d.user}','${d.pass}')">
          <div>
            <div class="code">${d.code}</div>
            <div class="tienda">${d.tienda}</div>
            <div class="estado">
              <span class="badge ${d.estado}">${d.estado}</span>
            </div>
          </div>
          <div class="arrow">›</div>
        </div>
      `;
    });
}

// ✅ BUSCADOR (SIN LAG)
document.getElementById("search").addEventListener("input", e => {

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    render(e.target.value);
  }, 250);
});

// ✅ MODAL
function openModal(tienda, user, pass) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitle").innerText = tienda;
  document.getElementById("modalUser").innerText = user;
  document.getElementById("modalPass").innerText = pass;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ✅ COPIAR
function copyData() {
  const text =
    "Usuario: " + document.getElementById("modalUser").innerText +
    "\nContraseña: " + document.getElementById("modalPass").innerText;

  navigator.clipboard.writeText(text);
  alert("Copiado ✅");
}

// ✅ CERRAR MODAL
document.getElementById("modal").onclick = function(e) {
  if (e.target.id === "modal") {
    closeModal();
  }
};

</script>
</body>
</html>
